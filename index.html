<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
// Page Shell
    <div class="page">
 
    <header class="masthead">
      <div class="masthead__brand">
        <span class="masthead__mark">W</span>
        <div>
          <h1 class="masthead__title">Wordly</h1>
          <p class="masthead__tagline">a running dictionary, kept by you</p>
        </div>
      </div>
    
      // Theme toggle
    <button id="theme-toggle" class="theme-toggle" type="button" aria-pressed="false">
        <span class="theme-toggle__icon" aria-hidden="true">●</span>
        <span class="theme-toggle__label">Night page</span>
    </button>
    </header>
 
    <div class="layout">
 
      <main class="entry-column">
      // Search form
        <form id="search-form" class="search" autocomplete="off">
          <label for="word-input" class="search__label">Look up a word</label>
          <div class="search__row">
            <span class="search__guide" aria-hidden="true">§</span>
            <input
              id="word-input"
              class="search__input"
              type="text"
              name="word"
              placeholder="e.g. serendipity"
              required
            />
            <button id="search-button" class="search__button" type="submit">Search</button>
          </div>
        </form>
        // Error message
            <p id="error-message" class="status status--error" hidden></p>
            <p id="loading-message" class="status status--loading" hidden>Turning pages…</p>
        // Entry results
           <article id="result" class="entry" hidden>
 
          <div class="entry__rule" aria-hidden="true"></div>
 
          <div class="entry__body">
            <div class="entry__headrow">
              <h2 id="word" class="entry__headword"></h2>
              <button id="play-audio" class="entry__audio" type="button" hidden title="Play pronunciation">
              </button>
              <button id="save-word" class="entry__save" type="button">
                <span id="save-icon" aria-hidden="true">☆</span>
                <span id="save-label">Save</span>
              </button>
            </div>
 
            <p id="phonetic" class="entry__phonetic"></p>
 
</body>
</html>
